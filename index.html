<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Duy Le | ML & Computational Physics Researcher</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    /* ===================== RESET & VARIABLES ===================== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:       #0f4c81;
      --primary-light: #1a6bb5;
      --accent:        #00b4d8;
      --accent-soft:   #90e0ef;
      --bg:            #f8f9fa;
      --bg-card:       #ffffff;
      --text:          #1a1a2e;
      --text-muted:    #6c757d;
      --border:        #e0e6ef;
      --gradient:      linear-gradient(135deg, #0f4c81 0%, #00b4d8 100%);
      --shadow:        0 4px 24px rgba(15, 76, 129, 0.10);
      --shadow-hover:  0 8px 32px rgba(15, 76, 129, 0.18);
      --radius:        14px;
      --nav-height:    68px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
    }

    /* ===================== NAVBAR ===================== */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1000;
      height: var(--nav-height);
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 6%;
      box-shadow: 0 2px 16px rgba(15,76,129,0.06);
    }

    .nav-logo {
      font-weight: 700;
      font-size: 1.2rem;
      color: var(--primary);
      text-decoration: none;
      letter-spacing: -0.5px;
    }
    .nav-logo span { color: var(--accent); }

    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a {
      color: var(--text);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      transition: color 0.2s;
      position: relative;
    }
    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: -3px; left: 0; right: 0;
      height: 2px;
      background: var(--accent);
      transform: scaleX(0);
      transition: transform 0.2s;
    }
    .nav-links a:hover { color: var(--accent); }
    .nav-links a:hover::after { transform: scaleX(1); }

    /* ===================== HERO ===================== */
    .hero {
      min-height: 100vh;
      background: var(--gradient);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: calc(var(--nav-height) + 2rem) 5% 5rem;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Ccircle cx='30' cy='30' r='2'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }

    .hero-content { position: relative; z-index: 1; max-width: 720px; }

    .hero-avatar {
      width: 145px; height: 145px;
      border-radius: 50%;
      border: 4px solid rgba(255,255,255,0.6);
      box-shadow: 0 8px 32px rgba(0,0,0,0.22);
      margin-bottom: 1.5rem;
      object-fit: cover;
    }

    .hero h1 {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 700;
      color: #fff;
      margin-bottom: 0.4rem;
      letter-spacing: -1px;
    }

    .hero-title {
      font-size: 1.1rem;
      color: var(--accent-soft);
      font-weight: 500;
      margin-bottom: 0.5rem;
    }

    .hero-location {
      color: rgba(255,255,255,0.7);
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }
    .hero-location i { margin-right: 4px; }

    .hero-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 0.55rem;
      justify-content: center;
      margin-bottom: 2rem;
    }

    .badge {
      background: rgba(255,255,255,0.15);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.3);
      padding: 0.28rem 0.9rem;
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 500;
      backdrop-filter: blur(6px);
    }

    .hero-socials {
      display: flex;
      gap: 0.8rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 2rem;
    }

    .social-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      background: rgba(255,255,255,0.15);
      color: #fff;
      text-decoration: none;
      padding: 0.5rem 1.15rem;
      border-radius: 999px;
      font-size: 0.85rem;
      font-weight: 500;
      border: 1px solid rgba(255,255,255,0.3);
      transition: background 0.2s, transform 0.2s;
    }
    .social-btn:hover { background: rgba(255,255,255,0.28); transform: translateY(-2px); }

    .hero-cta {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: #fff;
      color: var(--primary);
      text-decoration: none;
      padding: 0.75rem 2rem;
      border-radius: 999px;
      font-weight: 600;
      font-size: 0.95rem;
      box-shadow: 0 4px 16px rgba(0,0,0,0.18);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .hero-cta:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.22); }

    .scroll-indicator {
      position: absolute;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.55);
      font-size: 1.4rem;
      animation: bounce 2s infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50%       { transform: translateX(-50%) translateY(8px); }
    }

    /* ===================== SECTION BASE ===================== */
    section { padding: 5rem 6%; }
    .section-inner { max-width: 1100px; margin: 0 auto; }

    .section-label {
      font-size: 0.78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--accent);
      margin-bottom: 0.4rem;
    }

    .section-title {
      font-size: clamp(1.6rem, 3vw, 2.2rem);
      font-weight: 700;
      color: var(--text);
      margin-bottom: 0.4rem;
      letter-spacing: -0.5px;
    }

    .section-divider {
      width: 48px; height: 4px;
      background: var(--gradient);
      border-radius: 2px;
      margin-bottom: 2.5rem;
    }

    .alt-bg { background: #eef3f9; }

    /* ===================== ABOUT ===================== */
    .about-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3rem;
      align-items: start;
    }

    .about-text p {
      color: var(--text-muted);
      margin-bottom: 1rem;
      font-size: 1.02rem;
    }
    .about-text strong { color: var(--text); }

    .about-highlights { display: flex; flex-direction: column; gap: 1rem; }

    .highlight-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.2rem 1.4rem;
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      box-shadow: var(--shadow);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .highlight-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-hover); }

    .highlight-icon {
      width: 44px; height: 44px;
      border-radius: 10px;
      background: var(--gradient);
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 1.1rem;
      flex-shrink: 0;
    }

    .highlight-card h4 {
      font-size: 0.92rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0.2rem;
    }
    .highlight-card p { font-size: 0.83rem; color: var(--text-muted); line-height: 1.5; }

    /* ===================== RESEARCH INTERESTS ===================== */
    .interests-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1.2rem;
    }

    .interest-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.3rem 1.2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      box-shadow: var(--shadow);
      transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
    }
    .interest-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-hover);
      border-color: var(--accent);
    }

    .interest-icon {
      width: 42px; height: 42px;
      border-radius: 10px;
      background: linear-gradient(135deg, #e0eef8, #c8e2f5);
      color: var(--primary);
      display: flex; align-items: center; justify-content: center;
